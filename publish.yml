name: Publish to PyPI
# PyPI "trusted publishing"
#   1. On GitHub: Settings -> Environments -> create one named "pypi".
#   2. On PyPI:   your project -> Publishing -> add a GitHub publisher
#      pointing at this repo, this workflow file, and the "pypi" environment.

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build the package
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1